<title>ตารางเรียน Mickey Ji</title>

<style>
  :root {
    --bg: #0f0f14;
    --card: #1a1a24;
    --border: #2a2a38;
    --accent1: #7c6aff;
    --accent2: #ff6a8a;
    --accent3: #6affb8;
    --accent4: #ffa96a;
    --accent5: #6ac8ff;
    --accent6: #e06aff;
    --text: #f0f0ff;
    --muted: #888899;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding: 20px 16px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .avatar {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; flex-shrink: 0;
  }
  .header-info h1 {
    font-size: 18px; font-weight: 700; line-height: 1.2;
  }
  .header-info p {
    font-size: 12px; color: var(--muted);
    margin-top: 2px;
  }
  .badge-row {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .badge {
    font-size: 10px; font-weight: 600;
    padding: 3px 8px; border-radius: 20px;
    letter-spacing: 0.3px;
  }

  /* Tab bar */
  .tabs {
    display: flex; gap: 4px;
    background: var(--card);
    border-radius: 12px;
    padding: 4px;
    margin: 12px 16px 0;
  }
  .tab {
    flex: 1; text-align: center;
    padding: 8px 4px;
    font-size: 12px; font-weight: 600;
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
    background: none;
    border: none;
    font-family: 'Sarabun', sans-serif;
  }
  .tab.active {
    background: var(--accent1);
    color: #fff;
  }

  /* Section */
  .section { padding: 12px 16px 0; }

  /* Legend */
  .legend {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 12px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--card);
    border-radius: 10px;
    padding: 8px 10px;
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .legend-text { font-size: 11px; line-height: 1.3; }
  .legend-time { font-size: 10px; color: var(--muted); }

  /* Day card */
  .day-card {
    background: var(--card);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .day-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    cursor: pointer;
    user-select: none;
  }
  .day-left { display: flex; align-items: center; gap: 10px; }
  .day-num {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    flex-shrink: 0;
  }
  .day-name { font-size: 14px; font-weight: 600; }
  .day-date { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .day-chips { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
  .chip {
    width: 20px; height: 20px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: #000;
  }
  .chevron {
    font-size: 10px; color: var(--muted);
    transition: transform 0.2s;
  }
  .day-card.open .chevron { transform: rotate(180deg); }

  .day-body {
    display: none;
    padding: 0 14px 12px;
    border-top: 1px solid var(--border);
  }
  .day-card.open .day-body { display: block; }

  .class-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .class-row:last-child { border-bottom: none; }
  .class-bar {
    width: 4px; border-radius: 4px; flex-shrink: 0;
    align-self: stretch; min-height: 32px;
  }
  .class-info {}
  .class-name { font-size: 13px; font-weight: 600; }
  .class-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .class-session { font-size: 10px; margin-top: 3px; font-weight: 600; }

  /* Month filter */
  .month-pills {
    display: flex; gap: 6px;
    overflow-x: auto; padding-bottom: 2px;
    margin-bottom: 12px;
    scrollbar-width: none;
  }
  .month-pills::-webkit-scrollbar { display: none; }
  .month-pill {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px; font-weight: 600;
    cursor: pointer;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Sarabun', sans-serif;
    transition: all 0.2s;
  }
  .month-pill.active {
    background: var(--accent1);
    color: #fff;
    border-color: var(--accent1);
  }

  /* Today highlight */
  .today-badge {
    font-size: 9px; background: var(--accent2);
    color: #fff; padding: 2px 6px; border-radius: 6px; font-weight: 700;
    margin-left: 4px;
  }

  /* Summary view */
  .summary-grid { display: flex; flex-direction: column; gap: 8px; }
  .summary-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px;
    border-left: 4px solid;
  }
  .summary-subject { font-size: 15px; font-weight: 700; }
  .summary-teacher { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .summary-detail { font-size: 12px; margin-top: 6px; display: flex; gap: 12px; flex-wrap: wrap; }
  .summary-stat { display: flex; flex-direction: column; }
  .summary-stat-val { font-size: 18px; font-weight: 700; line-height: 1; }
  .summary-stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* Day-of-week view */
  .dow-section { margin-bottom: 16px; }
  .dow-header {
    font-size: 12px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 8px; padding-left: 4px;
  }

  .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 30px; }
</style>
</head>

function getMonths() {
  const ms = ['ทั้งหมด'];
  DAYS.filter(d => !isPast(d)).forEach(d => { if (!ms.includes(d.month)) ms.push(d.month); });
  return ms;
}

function renderMonthPills() {
  const el = document.getElementById('monthPills');
  el.innerHTML = getMonths().map(m =>
    `<button class="month-pill ${m===activeMonth?'active':''}" onclick="filterMonth('${m}')">${m}</button>`
  ).join('');
}

function filterMonth(m) {
  activeMonth = m;
  renderMonthPills();
  renderDayList();
}

const monthMap = {'ม.ค.':0,'ก.พ.':1,'มี.ค.':2,'เม.ย.':3,'พ.ค.':4,'มิ.ย.':5,'ก.ค.':6,'ส.ค.':7,'ก.ย.':8,'ต.ค.':9,'พ.ย.':10,'ธ.ค.':11};

function parseDay(day) {
  const parts = day.date.split(' ');
  return new Date(parseInt(parts[2]) - 543, monthMap[parts[1]], parseInt(parts[0]));
}

function isToday(day) {
  const t = new Date();
  const d = parseDay(day);
  return t.getFullYear() === d.getFullYear() && t.getMonth() === d.getMonth() && t.getDate() === d.getDate();
}

function isPast(day) {
  const t = new Date(); t.setHours(0,0,0,0);
  const d = parseDay(day);
  return d < t;
}

function renderDayList() {
  const el = document.getElementById('dayList');
  const base = activeMonth === 'ทั้งหมด' ? DAYS : DAYS.filter(d => d.month === activeMonth);
  const filtered = base.filter(d => !isPast(d));
  if (!filtered.length) { el.innerHTML = '<div class="empty">🎉 ไม่มีคลาสที่เหลืออยู่แล้ว</div>'; return; }

  el.innerHTML = filtered.map(day => {
    const today = isToday(day);
    const color = DOW_COLORS[day.dow] || '#888';
    const bg = DOW_BG[day.dow] || '#88888822';
    const chips = day.classes.map(c => `<span class="chip" style="background:${SUBJECTS[c.s].color}">${SUBJECTS[c.s].abbr}</span>`).join('');
    const rows = day.classes.map(c => {
      const sub = SUBJECTS[c.s];
      return `<div class="class-row">
        <div class="class-bar" style="background:${sub.color}"></div>
        <div class="class-info">
          <div class="class-name">${sub.name}${sub.teacher ? ' · ' + sub.teacher : ''}</div>
          <div class="class-time">🕐 ${sub.time}</div>
          <div class="class-session" style="color:${sub.color}">ครั้งที่ ${c.sess}</div>
        </div>
      </div>`;
    }).join('');
    return `<div class="day-card" id="day-${day.n}">
      <div class="day-header" onclick="toggleDay(${day.n})">
        <div class="day-left">
          <div class="day-num" style="background:${bg};color:${color}">${day.n}</div>
          <div>
            <div class="day-name">
              วัน${day.dow}
              ${today ? '<span class="today-badge">วันนี้</span>' : ''}
            </div>
            <div class="day-date">${day.date}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="day-chips">${chips}</div>
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="day-body">${rows}</div>
    </div>`;
  }).join('');

  // Auto-open today
  DAYS.forEach(d => { if (isToday(d)) { setTimeout(() => toggleDay(d.n, true), 100); } });
}

function toggleDay(n, forceOpen) {
  const el = document.getElementById('day-' + n);
  if (!el) return;
  if (forceOpen) el.classList.add('open');
  else el.classList.toggle('open');
}

function renderSummary() {
  const stats = {};
  DAYS.forEach(d => d.classes.forEach(c => {
    stats[c.s] = (stats[c.s] || 0) + 1;
  }));
  const subjectOrder = ['thai','math_kib','math_pao','math_step','chem','bio','social','eng'];
  const el = document.getElementById('summaryGrid');
  el.innerHTML = subjectOrder.map(key => {
    const sub = SUBJECTS[key];
    const count = stats[key] || 0;
    return `<div class="summary-card" style="border-color:${sub.color}">
      <div class="summary-subject">${sub.name}</div>
      <div class="summary-teacher">${sub.teacher ? '👤 ' + sub.teacher + '  ' : ''}⏰ ${sub.time}</div>
      <div class="summary-detail">
        <div class="summary-stat">
          <span class="summary-stat-val" style="color:${sub.color}">${count}</span>
          <span class="summary-stat-lbl">ครั้ง</span>
        </div>
        <div class="summary-stat">
          <span class="summary-stat-val" style="color:${sub.color}">${key==='math_kib'?9:key==='math_step'?Math.round(count*3):count*2} ชม.</span>
          <span class="summary-stat-lbl">รวมเวลา</span>
        </div>
        <div class="summary-stat">
          <span class="summary-stat-val" style="color:${sub.color}">${sub.day}</span>
          <span class="summary-stat-lbl">วันเรียน</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderWeekly() {
  const dowOrder = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  const grouped = {};
  dowOrder.forEach(d => grouped[d] = []);
  DAYS.forEach(d => { if (grouped[d.dow]) grouped[d.dow].push(d); });

  const el = document.getElementById('weeklyView');
  el.innerHTML = dowOrder.filter(dow => grouped[dow].length > 0).map(dow => {
    const color = DOW_COLORS[dow] || '#888';
    // Get unique subjects for this dow
    const subs = {};
    grouped[dow].forEach(d => d.classes.forEach(c => { subs[c.s] = true; }));
    const subCards = Object.keys(subs).map(key => {
      const sub = SUBJECTS[key];
      return `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
        <div style="width:4px;height:36px;border-radius:4px;background:${sub.color};flex-shrink:0"></div>
        <div>
          <div style="font-size:13px;font-weight:600">${sub.name}</div>
          <div style="font-size:11px;color:var(--muted)">${sub.time} · ${grouped[dow].length} ครั้ง</div>
        </div>
      </div>`;
    }).join('');
    return `<div class="dow-section">
      <div class="dow-header" style="color:${color}">วัน${dow} (${grouped[dow].length} วัน)</div>
      <div style="background:var(--card);border-radius:var(--radius);padding:0 14px;border:1px solid var(--border)">
        ${subCards}
      </div>
    </div>`;
  }).join('');
}

function switchTab(tab) {
  activeTab = tab;
  ['schedule','summary','weekly'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach((el, i) => {
      const tabs = ['schedule','summary','weekly'];
      el.classList.toggle('active', tabs[i] === tab);
    });
  });
}

// Init
renderMonthPills();
renderDayList();
renderSummary();
renderWeekly();

// Auto-scroll to today
setTimeout(() => {
  DAYS.forEach(d => {
    if (isToday(d)) {
      const el = document.getElementById('day-' + d.n);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  });
}, 300);
</script>
